apiVersion: apps/v1
kind: Deployment
metadata:
  name: secret-challenge
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secret-challenge
  template:
    metadata:
      labels:
        app: secret-challenge
    spec:
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
      volumes:
        - name: secret-code
          emptyDir: {}
        - name: config-volume
          configMap:
            name: secret-code-configmap
      initContainers:
        - name: init-copy
          image: busybox
          command: ["/bin/sh", "-c"]
          args:
            - "cp /config/secret_challenge52.c /mnt/secret_challenge52.c && chmod 644 /mnt/secret_challenge52.c"
          volumeMounts:
            - name: config-volume
              mountPath: /config
            - name: secret-code
              mountPath: /mnt
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: secret-code-configmap
  namespace: default
data:
  secret_challenge52.c: |
    #include <stdio.h>
    #include <stdlib.h>
    #include <string.h>
    #include <unistd.h>

    #define SECRET_SIZE 32

    char secret[SECRET_SIZE];

    void generate_secret() {
        strncpy(secret, "K8S_DEBUG_SECRET", SECRET_SIZE - 1);
        secret[SECRET_SIZE - 1] = '\0';
    }

    void handle_request() {
        sleep(5);
    }

    int main() {
        generate_secret();
        while (1) {
            handle_request();
        }
        return 0;
    }
