apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: secret-challenge
  name: secret-challenge
  namespace: default
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: secret-challenge
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/tls-skip-verify: "true"
        vault.hashicorp.com/namespace: "default"
        vault.hashicorp.com/log-level: debug
        vault.hashicorp.com/agent-inject-secret-challenge46: "secret/data/injected"
        vault.hashicorp.com/agent-inject-template-challenge46: |
          {{ with secret "/secret/data/injected" }}
            {{ range $k, $v := .Data.data }}
              {{ printf "echo %s=%s" $k $v }}
            {{ end }}
          {{ end }}
        vault.hashicorp.com/agent-inject-secret-challenge47: "secret/data/codified"
        vault.hashicorp.com/agent-inject-template-challenge47: |
          {{ with secret "secret/data/codified" }}
              export challenge47secret="isthiswhatweneed?"
          {{ end }}
        vault.hashicorp.com/role: "secret-challenge"
      labels:
        app: secret-challenge
      name: secret-challenge
    spec:
      securityContext:
        runAsUser: 2000
        fsGroup: 2000
        runAsGroup: 2000
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: vault

      initContainers:
        - name: init-copy
          image: busybox
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          command: ["/bin/sh", "-c"]
          args:
            - "cp /config/secret_challenge52.c /mnt/secret_challenge52.c && chmod 644 /mnt/secret_challenge52.c"
          volumeMounts:
            - name: config-volume
              mountPath: /config
            - name: shared-data
              mountPath: /mnt

      volumes:
        - name: secret-code
          emptyDir: {} 
        - name: config-volume
          configMap:
            name: secret-code-configmap
        - name: shared-data
          emptyDir: {}
        - name: "ephemeral"
          emptyDir: {}

      containers:
        - name: secret-challenge
          image: jeroenwillemsen/wrongsecrets:1.10.2-k8s-vault
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh"]
          args:
            [
              "-c",
              "source /vault/secrets/challenge46 && source /vault/secrets/challenge47 && java -jar -Dspring.profiles.active=kubernetes-vault -Dspringdoc.swagger-ui.enabled=true -Dspringdoc.api-docs.enabled=true -D /application/application.jar",
            ]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: "/actuator/health/readiness"
              port: 8080
            initialDelaySeconds: 30
            timeoutSeconds: 5
            periodSeconds: 5
            failureThreshold: 8
          livenessProbe:
            httpGet:
              path: "/actuator/health/liveness"
              port: 8080
            initialDelaySeconds: 35
            timeoutSeconds: 30
            periodSeconds: 40
            failureThreshold: 5
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
              ephemeral-storage: "1Gi"
            limits:
              memory: "512Mi"
              cpu: "1200m"
              ephemeral-storage: "2Gi"
          volumeMounts:
            - name: "ephemeral"
              mountPath: "/tmp"
            - name: shared-data
              mountPath: "/workspace"

        - name: wr-container
          image: pastekitoo/wrongsecrets52:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: shared-data
              mountPath: /workspace
          command: ["/bin/sh", "-c"]
          args:
            - "cp /workspace/secret_challenge52.c /workspace/shared_challenge52.c &&
               gcc /workspace/shared_challenge52.c -o /workspace/secret_challenge52 &&
               chmod 111 /workspace/secret_challenge52 &&
               /workspace/secret_challenge52 && echo '0' > /proc/sys/kernel/yama/        ptrace_scope"

      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: secret-code-configmap
  namespace: default
data:
  secret_challenge52.c: |
    #include <stdio.h>
    #include <stdlib.h>
    #include <string.h>
    #include <unistd.h>
    
    #define SECRET_SIZE 32
    
    char secret[SECRET_SIZE];
    
    void generate_secret() {
        strncpy(secret, "K8S_DEBUG_SECRET", SECRET_SIZE - 1);
        secret[SECRET_SIZE - 1] = '\0';
    }
    
    void handle_request() {
        sleep(5);
    }
    
    int main() {
        generate_secret();
        while (1) {
            handle_request();
        }
        return 0;
    }
